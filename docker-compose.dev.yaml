# CloudOS — Development Docker Compose
# Start: docker compose -f docker-compose.dev.yaml up

version: "3.9"

services:
  cloudos-kernel:
    build:
      context: .
      dockerfile: Dockerfile.dev
    container_name: cloudos-dev
    ports:
      - "${CLOUDOS_PORT:-8080}:8080"
    volumes:
      - ./core/cloudos:/app
      - ./cloudos.yaml:/etc/cloudos/cloudos.yaml
      - cloudos-data:/var/lib/cloudos
    environment:
      - CLOUDOS_LOG_LEVEL=${CLOUDOS_LOG_LEVEL:-debug}
      - CLOUDOS_PORT=${CLOUDOS_PORT:-8080}
      - CLOUDOS_JWT_SECRET=${CLOUDOS_JWT_SECRET:-dev-secret-not-for-production}
      - CLOUDOS_DATA_DIR=/var/lib/cloudos
    env_file:
      - .env.development
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  dashboard:
    image: node:22-alpine
    container_name: cloudos-dashboard-dev
    ports:
      - "5173:5173"
    working_dir: /app
    volumes:
      - ./apps/dashboard:/app
      - ./packages:/app/../packages
    command: sh -c "npm install && npm run dev -- --host 0.0.0.0"
    depends_on:
      - cloudos-kernel
    environment:
      - VITE_API_URL=http://localhost:8080

volumes:
  cloudos-data:
